name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Pinned, license-free gitleaks release binary (no marketplace action /
      # Docker tag / paid license required for private repos).
      - name: Install gitleaks (pinned)
        run: |
          set -euo pipefail
          cd "$RUNNER_TEMP"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz" -o gitleaks.tgz
          tar -xzf gitleaks.tgz gitleaks
          chmod +x gitleaks

      - name: Secret scan
        run: '"$RUNNER_TEMP/gitleaks" dir . --config=.gitleaks.toml --redact --no-banner'
